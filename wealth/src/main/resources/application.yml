server:
  port: 8080
  servlet:
    context-path: /api

spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/wealth_db
    username: root123
    password: Hxb,15913232568
    driver-class-name: com.mysql.cj.jdbc.Driver
  # H2数据库配置（用于开发和测试）
  h2:
    console:
      enabled: true
      path: /h2-console
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  # 安全配置
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN
  # Flyway配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    table: flyway_schema_history

# 日志配置
logging:
  level:
    root: INFO
    com.example.wealth: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT配置
jwt:
  secret: your-secret-key-change-in-production
  expiration: 3600000 # 1小时
  issuer: wealth-app